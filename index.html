<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoraCars | AutoRepuestos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Variables de color basadas en tu logo */
        :root {
            --bg-dark: #120303;
            --card-bg: #1e0a0a;
            --primary-red: #8b1e1e;
            --accent-orange: #d96b43;
            --text-light: #ffffff;
            --text-gray: #b3a3a3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #2a0808 100%);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        /* Encabezado y Logo */
        .header {
            margin-bottom: 32px;
        }

        .logo {
            width: 180px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0px 4px 10px rgba(0, 0, 0, 0.7));
        }

        .tagline {
            font-size: 0.95rem;
            color: var(--text-gray);
            font-weight: 400;
            letter-spacing: 1px;
        }

        /* Contenedor de Enlaces */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Estilo de los Botones */
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: rgba(30, 10, 10, 0.6);
            border: 2px solid var(--primary-red);
            color: var(--text-light);
            padding: 16px 20px;
            font-size: 1.05rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
        }

        /* Iconos dentro de los botones */
        .link-btn i {
            position: absolute;
            left: 20px;
            font-size: 1.3rem;
        }

        /* Efectos Hover (Al pasar el mouse o presionar) */
        .link-btn:hover {
            background: var(--primary-red);
            border-color: var(--accent-orange);
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(139, 30, 30, 0.4);
        }

        .link-btn:active {
            transform: translateY(-1px);
        }

        /* Botón destacado (por ejemplo, para cotizaciones directas) */
        .link-btn.featured {
            background: linear-gradient(90deg, var(--primary-red) 0%, #b32424 100%);
            border-color: var(--accent-orange);
            animation: pulse 2s infinite;
        }

        .link-btn.featured:hover {
            background: linear-gradient(90deg, #b32424 0%, var(--accent-orange) 100%);
        }

        /* Footer */
        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: var(--text-gray);
        }

        /* Animación para el botón destacado */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(139, 30, 30, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(139, 30, 30, 0); }
            100% { box-shadow: 0 0 0 0 rgba(139, 30, 30, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="header">
            <img src="logo moraacars.jpeg" alt="MoraCars Logo" class="logo">
            <p class="tagline">Repuestos de Calidad para tu Vehículo</p>
        </div>

        <div class="links-container">
            
            <a href="https://wa.me/584243363539?text=Hola,%20busco%20un%20repuesto" target="_blank" class="link-btn featured">
                <i class="fa-brands fa-whatsapp"></i> Cotizar por WhatsApp
            </a>

            <a href="#" target="_blank" class="link-btn">
                <i class="fa-solid fa-book-open"></i> Ver Catálogo Digital
            </a>

            <a href="https://www.instagram.com/moracars?igsh=azcxOXZ5NmkycTFs" target="_blank" class="link-btn">
                <i class="fa-brands fa-instagram"></i> Síguenos en Instagram
            </a>

            <a href="https://maps.app.goo.gl/nRcYDJcxcefhBcHN6" target="_blank" class="link-btn">
                <i class="fa-solid fa-location-dot"></i> Ubicación de la Tienda
            </a>

            <a href="9:00 am - 9:00pm" class="link-btn">
                <i class="fa-solid fa-clock"></i> Horarios de Atención
            </a>

        </div>

        <div class="footer">
            <p>&copy; 2026 MoraCars. Todos los derechos reservados.</p>
        </div>

    </div>

</body>
</html>
