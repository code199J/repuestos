<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoraCars | AutoRepuestos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #120303;
            --card-bg: #1e0a0a;
            --primary-red: #8b1e1e;
            --accent-orange: #d96b43;
            --text-light: #ffffff;
            --text-gray: #b3a3a3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #2a0808 100%);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        .header {
            margin-bottom: 32px;
        }

        .logo {
            width: 180px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow( 0px 0px 15px rgba(255, 255, 255, 0.8) );
        }

        .tagline {
            font-size: 0.95rem;
            color: var(--text-gray);
            font-weight: 400;
            letter-spacing: 1px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: rgba(30, 10, 10, 0.6);
            border: 2px solid var(--primary-red);
            color: var(--text-light);
            padding: 16px 20px;
            font-size: 1.05rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            cursor: pointer;
        }

        .link-btn i {
            position: absolute;
            left: 20px;
            font-size: 1.3rem;
        }

        .link-btn:hover {
            background: var(--primary-red);
            border-color: var(--accent-orange);
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(139, 30, 30, 0.4);
        }

        .link-btn.featured {
            background: linear-gradient(90deg, var(--primary-red) 0%, #b32424 100%);
            border-color: var(--accent-orange);
            animation: pulse 2s infinite;
        }

        .link-btn.featured:hover {
            background: linear-gradient(90deg, #b32424 0%, var(--accent-orange) 100%);
        }

        /* --- NUEVO: Estilos para el Horario Desplegable --- */
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
            background: rgba(30, 10, 10, 0.4);
            border: 0 solid var(--primary-red);
            border-radius: 0 0 8px 8px;
            margin-top: -14px; /* Hace que se pegue al botón de arriba */
            text-align: left;
            padding: 0 20px;
        }

        .accordion-content.open {
            padding: 20px;
            border: 2px solid var(--primary-red);
            border-top: none;
            max-height: 200px; /* Altura máxima estimada */
        }

        .schedule-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95rem;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
            padding-bottom: 4px;
        }
        
        .schedule-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: var(--text-gray);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(139, 30, 30, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(139, 30, 30, 0); }
            100% { box-shadow: 0 0 0 0 rgba(139, 30, 30, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="header">
            <img src="Logo moracars.png" alt="MoraCars Logo" class="logo">
            <p class="tagline">Repuestos de Calidad para tu Vehículo</p>
        </div>

        <div class="links-container">
            
            <a href="https://wa.me/584243363539?text=Hola,%20busco%20un%20repuesto" target="_blank" class="link-btn featured">
                <i class="fa-brands fa-whatsapp"></i> Cotizar por WhatsApp
            </a>

            <a href="https://drive.google.com/drive/folders/1A2B3C4D5E6F7G8H9I0J" target="_blank" class="link-btn">
                <i class="fa-solid fa-book-open"></i> Ver Catálogo Digital
            </a>

            <a href="https://www.instagram.com/moracars?igsh=azcxOXZ5NmkycTFs" target="_blank" class="link-btn">
                <i class="fa-brands fa-instagram"></i> Síguenos en Instagram
            </a>

            <a href="https://maps.app.goo.gl/nRcYDJcxcefhBcHN6" target="_blank" class="link-btn">
                <i class="fa-solid fa-location-dot"></i> Ubicación de la Tienda
            </a>

            <div class="link-btn" id="btn-horario">
                <i class="fa-solid fa-clock"></i> Horarios de Atención
            </div>
            
            <div class="accordion-content" id="panel-horario">
                <div class="schedule-row">
                    <span>Lunes a Viernes:</span>
                    <strong>8:00 AM - 5:35 PM</strong>
                </div>
                <div class="schedule-row">
                    <span>Sábados:</span>
                    <strong>9:00 AM - 6:30 PM</strong>
                </div>
                <div class="schedule-row">
                    <span>Domingos:</span>
                    <span style="color: var(--accent-orange);">solo por encargo</span>
                </div>
            </div>

        </div>

        <div class="footer">
            <p>© 2026 MoraCars. Todos los derechos reservados.</p>
        </div>

    </div>

    <script>
        const btnHorario = document.getElementById('btn-horario');
        const panelHorario = document.getElementById('panel-horario');

        btnHorario.addEventListener('click', () => {
            panelHorario.classList.toggle('open');
            
            // Ajuste estético de los bordes del botón cuando se abre
            if(panelHorario.classList.contains('open')) {
                btnHorario.style.borderRadius = "8px 8px 0 0";
            } else {
                setTimeout(() => {
                    btnHorario.style.borderRadius = "8px";
                }, 300); // Espera a que termine la animación
            }
        });
    </script>
</body>
</html>
